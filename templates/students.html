{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2>Add Student</h2>

    <form action="/add_student" method="POST">
        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="roll_number" placeholder="Roll No" required>

        <select name="year_id">
            {% for year in years %}
            <option value="{{ year.id }}">Year {{ year.year_number }}</option>
            {% endfor %}
        </select>

        <select name="section_id">
            {% for section in sections %}
            <option value="{{ section.id }}">
                {{ section.section_name }} (Year {{ section.year_id }})
            </option>
            {% endfor %}
        </select>

        <button>Add</button>
    </form>
</div>

<div class="card">
    <h2>Students</h2>

    <ul>
        {% for student in students %}
        <li>
            {{ student.name }} - {{ student.roll_number }}
            <a href="/delete_student/{{ student.id }}">❌</a>
        </li>
        {% endfor %}
    </ul>
</div>

{% endblock %}
